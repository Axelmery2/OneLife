name: onelife

description: "OneLife - Une seule application pour organiser votre vie."

publish_to: 'none'

version: 1.0.7+8

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1

  google_fonts: ^6.3.0

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/images/logo_onelife.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_onelife.png"

  min_sdk_android: 23